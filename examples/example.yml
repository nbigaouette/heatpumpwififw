esphome:
  name: heatpumpwifi
  friendly_name: "HeatPumpWiFi"

esp32:
  # board: esp32dev
  board: esp32-c6-devkitc-1
  variant: esp32c6
  flash_size: 8MB
  framework:
    type: esp-idf
    version: recommended
    # version: 5.5.4

external_components:
  - source:
      type: local
      path: ../components
    components: [heatpumpwifi]

heatpumpwifi:
  uart_id: heatpumpwifi_uart

uart:
  id: heatpumpwifi_uart
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 115200
  debug:
    direction: BOTH
    dummy_receiver: false
    debug_prefix: "[MODBUS] "
    after:
      delimiter: "\n"
    sequence:
      - lambda: UARTDebug::log_string(direction, bytes, debug_prefix);

logger:
  level: VERBOSE
